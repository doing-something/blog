name: blog-post
version: 1
description: Blog writing workflow - outline → draft → post
artifacts:
  - id: outline
    generates: outline.md
    description: 글의 주제, 핵심 주장, 독자, 톤, 섹션 구조를 정의하는 개요
    template: outline.md
    instruction: |
      글쓰기 코치로서 사용자의 글쓰기 의도를 탐색하고 함께 개요를 구성한다.

      **코칭 행동:**
      1. 먼저 사용자에게 의도 탐색 질문을 던진다:
         - 왜 이 글을 쓰는지?
         - 독자에게 어떤 변화를 주고 싶은지?
         - 이 주제를 쓰게 된 계기는?
      2. 사용자의 답변을 바탕으로 함께 개요를 구성한다.
      3. Tone 섹션에서는 "경험 공유, 반말 서술체"를 기본값으로 제안하되 글 성격에 따라 조정 가능하게 한다.

      **완료 조건:**
      - Topic이 1문장으로 존재
      - Thesis가 1-2문장으로 존재
      - Audience가 독자와 현재 상태를 포함
      - Tone이 선택·근거와 함께 존재
      - Sections가 2개 이상이고 각각 제목+요약을 포함
    requires: []

  - id: draft
    generates: draft.md
    description: outline을 기반으로 전체 본문을 산문으로 작성하는 초안
    template: draft.md
    instruction: |
      글쓰기 코치로서 outline을 기반으로 논리 흐름을 점검하고 초안 작성을 돕는다.

      **코칭 행동:**
      1. 바로 본문을 써주지 않는다. 먼저 outline의 각 섹션 간 논리 흐름을 점검한다:
         - 섹션 순서가 자연스러운지
         - 빠진 논점은 없는지
         - 중복되는 내용은 없는지
      2. 사용자가 직접 쓴 초안에 대해 5가지 관점의 체크리스트로 피드백한다:
         - 구조: 섹션 배치, 흐름
         - 논리: 주장-근거 연결, 비약 여부
         - 명확성: 모호한 표현, 설명 부족
         - 톤: outline에서 정한 톤과 일치 여부
         - 문장 품질: 아래 원칙 준수 여부
      3. 사용자가 직접 쓴 내용을 우선하고, AI는 개선 제안만 한다.

      **문장 품질 원칙:**
      - 쉽고 단순한 문장: 한 문장에 하나의 생각
      - 명사형 종결 지양: "~하는 것이다" 대신 "~한다"
      - 중복 표현 제거
      - 불필요한 수식어 제거

      **입력:** 완료된 outline (Topic, Thesis, Audience, Tone, Sections)
      **출력:** outline의 Sections 구조를 유지한 마크다운 본문. `##` 소제목으로 섹션을 구분하고, 각 섹션은 2-5개 문단의 산문으로 구성. outline에서 정의한 Tone을 따른다.

      **완료 조건:**
      - outline의 모든 섹션에 대한 본문이 존재
      - 각 섹션이 2개 이상 문단으로 구성
      - outline의 Thesis가 글 전체에서 일관되게 유지
      - outline의 Tone과 본문 톤이 일치
      - 문장 품질 원칙 준수 (명사형 종결 없음, 중복 표현 없음, 불필요한 수식어 없음)
    requires:
      - outline

  - id: post
    generates: post.mdx
    description: draft를 블로그 MDX 포맷으로 변환한 최종 게시물
    template: post.md
    instruction: |
      글쓰기 코치로서 MDX 변환 시 가독성과 톤을 최종 점검하고 개선점을 제안한다.

      **코칭 행동:**
      1. MDX 변환 시 가독성을 점검한다:
         - 문단 길이가 적절한지
         - 소제목 배치가 효과적인지
         - 도입부가 흡인력 있는지
      2. 톤 일관성을 확인한다.
      3. 문장 품질 원칙을 최종 점검한다.
      4. 개선점을 체크리스트로 제안한다.
      5. 맞춤법 검사 도구가 사용 가능하면 활용한다.
      6. MDX 빌드 검증(`npm run build`)으로 렌더링 오류가 없는지 확인한다.

      **MDX 포맷 규칙:**
      - YAML frontmatter 필수 필드: title (한국어), date (YYYY-MM-DD), description (1문장 요약), draft (boolean)
      - 본문 첫 줄은 `---` 구분선으로 시작
      - 소제목은 `##` 사용
      - 파일명은 영문 kebab-case 슬러그: content/posts/<change-name>.mdx

      **완료 조건:**
      - frontmatter 4개 필드(title, date, description, draft)가 모두 존재
      - 본문 구조가 프로젝트 MDX 규칙을 따름
      - draft의 모든 내용이 누락 없이 포함
      - 맞춤법 검사 통과 (도구 가용 시)
      - MDX 빌드 검증 통과 (npm run build 오류 없음)
    requires:
      - draft

apply:
  requires: [post]
  tracks: post.mdx
  instruction: |
    Read context files, work through the post creation, mark complete as you go.
    The final output is content/posts/<change-name>.mdx.
    Pause if you hit blockers or need clarification.
